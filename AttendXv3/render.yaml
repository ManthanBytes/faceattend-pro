services:
  - type: web
    name: attendx-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1 --threads 4 --bind 0.0.0.0:$PORT
    healthCheckPath: /ping
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendx-db
          property: connectionString

databases:
  - name: attendx-db
    plan: free
