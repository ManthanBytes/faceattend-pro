services:
  - type: web
    name: attendx-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 180 --workers 2 --threads 4 --bind 0.0.0.0:$PORT
    healthCheckPath: /ping
    envVars:
      - key: RENDER
        value: "true"
      - key: DATABASE_PATH
        value: /data/attendx.db
    disk:
      name: attendx-data
      mountPath: /data
      sizeGB: 1
