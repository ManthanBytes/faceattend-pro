services:
  - type: web
    name: faceattend-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: RENDER
        value: "true"
      - key: DATABASE_PATH
        value: /tmp/fa.db
