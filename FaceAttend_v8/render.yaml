services:
  - type: web
    name: faceattend-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1 --bind 0.0.0.0:$PORT
    disk:
      name: faceattend-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: RENDER
        value: "true"
